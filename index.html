<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualFinance - PRO  </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

     <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <h2><i class="fa-solid fa-bolt"></i> DualFinance</h2>
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 id="titulo-contexto">Painel Pessoal</h1>
                </div>
                
                <div class="toggle-container">
                    <button id="btn-pessoal" class="toggle-btn active" onclick="mudarContexto('pessoal')">
                        <i class="fa-solid fa-user"></i> Pessoal
                    </button>
                    <button id="btn-empresa" class="toggle-btn" onclick="mudarContexto('empresa')">
                        <i class="fa-solid fa-briefcase"></i> Empresa
                    </button>
                </div>

                <div class="user-info"><span id="status-conexao">🔄 Conectando...</span></div>
            </header>

            <section class="cards-section">
                <div class="card receita">
                    <div class="card-header-box">
                        <div class="card-info">
                            <h3>Receitas</h3>
                            <p id="total-receitas">R$ 0,00</p>
                        </div>
                        <div class="card-icon"><i class="fa-solid fa-arrow-up"></i></div>
                    </div>
                </div>
                <div class="card despesa">
                    <div class="card-header-box">
                        <div class="card-info">
                            <h3>Despesas</h3>
                            <p id="total-despesas">R$ 0,00</p>
                        </div>
                        <div class="card-icon"><i class="fa-solid fa-arrow-down"></i></div>
                    </div>
                </div>
                <div class="card saldo">
                    <div class="card-header-box">
                        <div class="card-info">
                            <h3>Saldo Líquido</h3>
                            <p id="saldo-liquido">R$ 0,00</p>
                        </div>
                        <div class="card-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                    </div>
                </div>
            </section>

            <section class="form-box">
                <h3><i class="fa-solid fa-plus"></i> Novo Lançamento (<span id="form-contexto-label">Pessoal</span>)</h3>
                <form id="finance-form" class="form-inline" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label for="desc">Descrição</label>
                        <input type="text" id="desc" placeholder="Ex: Salário ou Venda" required>
                    </div>
                    <div class="form-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" required>
                            <option value="receita">Receita (+)</option>
                            <option value="despesa">Despesa (-)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="mes">Mês</label>
                        <select id="mes" required>
                            <option value="Janeiro">Janeiro</option><option value="Fevereiro">Fevereiro</option>
                            <option value="Março">Março</option><option value="Abril">Abril</option>
                            <option value="Maio">Maio</option><option value="Junho">Junho</option>
                            <option value="Julho">Julho</option><option value="Agosto">Agosto</option>
                            <option value="Setembro">Setembro</option><option value="Outubro">Outubro</option>
                            <option value="Novembro">Novembro</option><option value="Dezembro">Dezembro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn-submit">Salvar na Nuvem</button>
                </form>
            </section>

            <section class="charts-section">
                <div class="chart-box">
                    <h3>Evolução Mensal</h3>
                    <div class="chart-container"><canvas id="graficoMensal"></canvas></div>
                </div>
                <div class="chart-box">
                    <h3>Últimos Lançamentos</h3>
                    <table class="data-table">
                        <thead>
                            <tr><th>Mês</th><th>Descrição</th><th>Valor</th><th>Ação</th></tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Configuração Inicial do Gráfico Global
        let meuGrafico;
        const ctx = document.getElementById('graficoMensal').getContext('2d');

        function renderizarGrafico(dadosReceitas, dadosDespesas) {
            const mesesLabels = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            if (meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: mesesLabels,
                    datasets: [
    { label: 'Receitas', data: dadosReceitas, backgroundColor: '#10b981' }, // Verde Esmeralda Sólido
    { label: 'Despesas', data: dadosDespesas, backgroundColor: '#f43f5e' }  // Vermelho Corporativo Elegante
]
                    
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { labels: { color: '#ffffff' } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8492a6' } },
                        x: { ticks: { color: '#8492a6' } }
                    }
                }
            });
        }
        renderizarGrafico(Array(12).fill(0), Array(12).fill(0));
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDCxLdesgvvqu9XvhxLlSG7zpHaMOKMt2I",
  authDomain: "dualfinance-d62f3.firebaseapp.com",
  projectId: "dualfinance-d62f3",
  storageBucket: "dualfinance-d62f3.firebasestorage.app",
  messagingSenderId: "690606524623",
  appId: "1:690606524623:web:abde4eb7e44b2569270fba",
  measurementId: "G-E3W56P0BWM"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transacoesRef = collection(db, "transacoes");

        let contextoAtual = 'pessoal'; // Contexto padrão ao abrir
        let unsubscribe; // Para limpar o escutador antigo do banco ao mudar de aba

        // Função para alternar as telas (Colocada no escopo global do módulo)
        window.mudarContexto = function(novoContexto) {
            contextoAtual = novoContexto;
            
            // Ajusta o visual dos botões de troca
            document.getElementById('btn-pessoal').classList.toggle('active', novoContexto === 'pessoal');
            document.getElementById('btn-empresa').classList.toggle('active', novoContexto === 'empresa');
            
            // Ajusta os textos da tela
            document.getElementById('titulo-contexto').innerText = novoContexto === 'pessoal' ? 'Painel Pessoal' : 'Painel Empresarial';
            document.getElementById('form-contexto-label').innerText = novoContexto === 'pessoal' ? 'Pessoal' : 'Empresa';
            
            // Reinicia a leitura do banco de dados filtrando pelo novo contexto
            conectarBancoRealtime();
        }

        function conectarBancoRealtime() {
            // Se já tiver uma conexão aberta, fecha para não duplicar dados na tela
            if (unsubscribe) unsubscribe();

            document.getElementById('status-conexao').innerText = "🔄 Atualizando Nuvem...";
            document.getElementById('status-conexao').style.color = "#7000ff";

            // FILTRO MÁGICO: "where('contexto', '==', contextoAtual)" separa o que é pessoal da empresa
            const q = query(transacoesRef, where("contexto", "==", contextoAtual), orderBy("criadoEm", "asc"));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';
                
                let receitasTotais = 0; let despesasTotais = 0;
                let receitasPorMes = Array(12).fill(0); let despesasPorMes = Array(12).fill(0);
                const mesesLista = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

                snapshot.forEach((docSnap) => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    const valorNumerico = parseFloat(t.valor) || 0;
                    const indexMes = mesesLista.indexOf(t.mes);

                    if(t.tipo === 'receita') {
                        receitasTotais += valorNumerico;
                        if(indexMes !== -1) receitasPorMes[indexMes] += valorNumerico;
                    } else {
                        despesasTotais += valorNumerico;
                        if(indexMes !== -1) despesasPorMes[indexMes] += valorNumerico;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><small>${t.mes}</small></td>
                        <td>${t.descricao}</td>
                        <td class="${t.tipo === 'receita' ? 'tag-receita' : 'tag-despesa'}">R$ ${valorNumerico.toFixed(2)}</td>
                        <td><button class="btn-deletar" data-id="${id}"><i class="fa-solid fa-trash"></i></button></td>
                    `;
                    tableBody.prepend(tr);
                });

                const saldo = receitasTotais - despesasTotais;
                document.getElementById('total-receitas').innerText = `R$ ${receitasTotais.toFixed(2)}`;
                document.getElementById('total-despesas').innerText = `R$ ${despesasTotais.toFixed(2)}`;
                document.getElementById('saldo-liquido').innerText = `R$ ${saldo.toFixed(2)}`;
                document.getElementById('saldo-liquido').style.color = saldo >= 0 ? '#00f2fe' : '#ff007f';

                renderizarGrafico(receitasPorMes, despesasPorMes);

                document.getElementById('status-conexao').innerText = "☁️ Nuvem Sincronizada";
                document.getElementById('status-conexao').style.color = "#00f2fe";

                // Botão Deletar
                document.querySelectorAll('.btn-deletar').forEach(btn => {
                    btn.onclick = async () => {
                        const idDeletar = btn.getAttribute('data-id');
                        await deleteDoc(doc(db, "transacoes", idDeletar));
                    };
                });
            }, (error) => {
                console.error("Erro no banco:", error);
                document.getElementById('status-conexao').innerText = "⚠️ Erro de Índices (Aguarde)";
                document.getElementById('status-conexao').style.color = "#ff007f";
            });
        }

        // SALVAR COM O CONTEXTO ATUAL
        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(transacoesRef, {
                descricao: document.getElementById('desc').value,
                tipo: document.getElementById('tipo').value,
                mes: document.getElementById('mes').value,
                valor: document.getElementById('valor').value,
                contexto: contextoAtual, // Salva se foi na aba 'pessoal' ou 'empresa'
                criadoEm: new Date()
            });
            document.getElementById('finance-form').reset();
        });

        // Inicializa a primeira carga
        conectarBancoRealtime();
    </script>
</body>
</html>
